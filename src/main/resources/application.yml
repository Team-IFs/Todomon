spring:  # 환경변수
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${google.clientId}
            client-secret: ${google.clientSecret}
            scope: profile,email
          naver:
            client-id: ${naver.clientId}
            client-secret: ${naver.clientSecret}
            scope: nickname,email,profile_image
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: https://ec2-54-158-162-51.compute-1.amazonaws.com//login/oauth2/code/naver
          kakao:
            client-id: ${kakao.clientId}
            client-secret: ${kakao.clientSecret}
            scope: profile_nickname, account_email, profile_image
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: https://ec2-54-158-162-51.compute-1.amazonaws.com//login/oauth2/code/kakao
            client-authentication-method: POST
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
---
spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: ${datasource.url}
    password: ${datasource.password}
    username: ${datasource.username}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update  # (1) 스키마 자동 생성
    show-sql: true      # (2) SQL 쿼리 출력
    properties:
      hibernate:
        highlight_sql: true
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
  redis:
    host: localhost
    port: 6379

mail:
  address:
    admin: ${admin.address}
jwt:
  key:
    secret: ${jwt.key}        # 민감한 정보는 시스템 환경 변수에서 로드한다.
  access-token-expiration-minutes: 30
  refresh-token-expiration-minutes: 420